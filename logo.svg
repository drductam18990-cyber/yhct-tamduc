<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <path id="tp" d="M24,100 A76,76 0 0,1 176,100"/>
  </defs>

  <!-- Nền tròn xanh -->
  <circle cx="100" cy="100" r="100" fill="#1c6e23"/>

  <!-- Tay trái: 3 ngón vàng -->
  <path d="M28,165 L43,133 L49,135 L34,167Z" fill="#ffd700"/>
  <path d="M39,168 L54,136 L60,138 L45,170Z" fill="#ffd700"/>
  <path d="M50,171 L65,138 L71,140 L56,173Z" fill="#ffd700"/>
  <!-- Lòng bàn tay trái -->
  <path d="M26,165 Q37,174 58,173 L57,178 Q36,179 25,170Z" fill="#ffd700"/>

  <!-- Tay phải: đối xứng -->
  <path d="M172,165 L157,133 L151,135 L166,167Z" fill="#ffd700"/>
  <path d="M161,168 L146,136 L140,138 L155,170Z" fill="#ffd700"/>
  <path d="M150,171 L135,138 L129,140 L144,173Z" fill="#ffd700"/>
  <!-- Lòng bàn tay phải -->
  <path d="M174,165 Q163,174 142,173 L143,178 Q164,179 175,170Z" fill="#ffd700"/>

  <!-- Hoa: 6 cánh vàng tại tâm (100, 110) -->
  <g transform="translate(100,110)">
    <ellipse cx="0" cy="-34" rx="17" ry="26" fill="#ffd700" transform="rotate(0)"/>
    <ellipse cx="0" cy="-34" rx="17" ry="26" fill="#ffd700" transform="rotate(60)"/>
    <ellipse cx="0" cy="-34" rx="17" ry="26" fill="#ffd700" transform="rotate(120)"/>
    <ellipse cx="0" cy="-34" rx="17" ry="26" fill="#ffd700" transform="rotate(180)"/>
    <ellipse cx="0" cy="-34" rx="17" ry="26" fill="#ffd700" transform="rotate(240)"/>
    <ellipse cx="0" cy="-34" rx="17" ry="26" fill="#ffd700" transform="rotate(300)"/>
  </g>

  <!-- Âm dương tại (100, 110), r=28 — tỷ lệ 0.56 từ 50px gốc -->
  <g transform="translate(100,110) scale(0.56)">
    <circle cx="0" cy="0" r="50" fill="#f0ead6"/>
    <path d="M0,-50 A50,50,0,0,0,0,50 A25,25,0,0,0,0,0 A25,25,0,0,1,0,-50Z" fill="#1a1a1a"/>
    <circle cx="0" cy="-25" r="8" fill="#f0ead6"/>
    <circle cx="0" cy="25" r="8" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- Chữ cong phía trên -->
  <text font-family="Georgia,'Times New Roman',serif" font-size="15" fill="white" font-weight="700" letter-spacing="3">
    <textPath href="#tp" startOffset="3%">ĐÔNG Y TÂM ĐỨC</textPath>
  </text>
</svg>
